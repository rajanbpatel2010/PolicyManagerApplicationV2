databases:
  - name: policy-manager-db
    plan: free # Change to standard/pro as needed
    region: ohio # Default region, can be changed

services:
  # Backend API Service
  - type: web
    name: policy-manager-api
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free # Change to standard/pro as needed
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: policy-manager-db
          property: connectionString
      - key: JwtSettings__SecretKey
        sync: false # Set this in the Render Dashboard
      - key: GeminiApi__ApiKey
        sync: false # Set this in the Render Dashboard
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  # Frontend Static Site Service
  - type: web
    name: policy-manager-ui
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/policy-manager-app/browser # Ensure this matches your angular.json output path
    plan: free
    # For Angular SPA routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
